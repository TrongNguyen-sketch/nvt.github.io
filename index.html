<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NVT Fashion Shop</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com">
</head>
<body>
    <!-- Thanh điều hướng -->
    <nav>
        <div class="logo">NVT <span>FASHION</span></div>
        <div class="cart-icon">
            <i class="fa-solid fa-bag-shopping"></i>
            <span id="cart-count">0</span>
        </div>
    </nav>

    <!-- Banner chính -->
    <header class="hero">
        <h1>BST MÙA HÈ 2026</h1>
        <p>Phong cách mới - Đẳng cấp mới</p>
        <button>Khám phá ngay</button>
    </header>

    <!-- Danh sách sản phẩm -->
    <section class="products">
        <h2>Sản Phẩm Mới Nhất</h2>
        <div class="product-grid" id="product-list">
            <!-- Sản phẩm 1 -->
            <div class="product-card">
                <img src="https://images.unsplash.com" alt="Áo thun">
                <h3>Áo Thun Oversize</h3>
                <p>250.000đ</p>
                <button class="add-to-cart">Thêm vào giỏ</button>
            </div>
            <!-- Sản phẩm 2 -->
            <div class="product-card">
                <img src="https://images.unsplash.com" alt="Áo khoác">
                <h3>Áo Khoác Bomber</h3>
                <p>550.000đ</p>
                <button class="add-to-cart">Thêm vào giỏ</button>
            </div>
            <!-- Sản phẩm 3 -->
            <div class="product-card">
                <img src="https://images.unsplash.com" alt="Quần Jean">
                <h3>Quần Jean Slimfit</h3>
                <p>420.000đ</p>
                <button class="add-to-cart">Thêm vào giỏ</button>
            </div>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
