<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NVT FASHION | Đẳng cấp phong cách</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com">
</head>
<body>

    <nav>
        <div class="logo">NVT.FASHION</div>
        <!-- GIỎ HÀNG MÀU ĐEN RÕ RÀNG -->
        <div class="cart-btn-black" onclick="toggleCart()">
            <i class="fa-solid fa-bag-shopping"></i>
            <span>GIỎ HÀNG</span>
            <span id="cart-count">0</span>
        </div>
    </nav>

    <header class="hero">
        <h1>Đừng nói bạn đẹp.<br>Hãy <span>chứng minh</span><br>bằng phong cách.</h1>
        <p>BST 2026 lấy cảm hứng từ sự tối giản và sức mạnh của công nghệ. Đẹp, chất và khác biệt trong từng đường kim mũi chỉ.</p>
        <button class="btn-main" onclick="window.location.href='#product-list'">KHÁM PHÁ BST</button>
    </header>

    <section class="products" id="product-list">
        <div class="product-grid">
            <!-- Sản phẩm 1 -->
            <div class="product-card">
                <img src="https://images.unsplash.com" alt="Áo thun">
                <div class="p-info">
                    <h3>Áo Thun Source Code</h3>
                    <p>350.000đ</p>
                    <button class="add-to-cart">THÊM VÀO GIỎ</button>
                </div>
            </div>
            <!-- Sản phẩm 2 -->
            <div class="product-card">
                <img src="https://images.unsplash.com" alt="Quần Jean">
                <div class="p-info">
                    <h3>Quần Jean Dark-Mode</h3>
                    <p>620.000đ</p>
                    <button class="add-to-cart">THÊM vào GIỎ</button>
                </div>
            </div>
        </div>
    </section>

    <!-- GIỎ HÀNG SIDEBAR -->
    <div class="cart-modal" id="cartModal">
        <div class="cart-header">
            <h2>Giỏ hàng của bạn</h2>
            <span style="cursor:pointer; font-size:30px" onclick="toggleCart()">×</span>
        </div>
        <div id="cart-items-list" style="margin-top:20px; flex:1; overflow-y:auto"></div>
        <div class="cart-footer">
            <h3>Tổng cộng: <span id="total-amount">0đ</span></h3>
            <button class="zalo-btn" onclick="sendOrderToZalo()">GỬI ĐƠN QUA ZALO</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
